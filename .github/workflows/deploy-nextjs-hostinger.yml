name: Deploy Node.js backend to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app if needed
        run: npm run build --if-present

      - name: Check deployment secrets
        id: deployment-secrets
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}
          HOSTINGER_PATH: ${{ secrets.HOSTINGER_PATH }}
        run: |
          if [ -n "$HOSTINGER_HOST" ] && \
             [ -n "$HOSTINGER_USERNAME" ] && \
             [ -n "$HOSTINGER_PASSWORD" ] && \
             [ -n "$HOSTINGER_PATH" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Deployment secrets found. Deployment will continue."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Deployment secrets are not configured. Skipping Hostinger deployment."
          fi

      - name: Deploy files to Hostinger
        if: steps.deployment-secrets.outputs.ready == 'true'
        uses: appleboy/scp-action@v0.1.6
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: ${{ secrets.HOSTINGER_PORT || 22 }}
          source: "app.js,package.json,package-lock.json"
          target: ${{ secrets.HOSTINGER_PATH }}
          overwrite: true
          rm: true

      - name: Install dependencies on server and restart app
        if: steps.deployment-secrets.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: ${{ secrets.HOSTINGER_PORT || 22 }}
          script: |
            cd ${{ secrets.HOSTINGER_PATH }}
            npm ci --omit=dev
            npm run build --if-present

            if pm2 list | grep -q "exit-pass-backend"; then
              pm2 restart exit-pass-backend
            else
              pm2 start npm --name exit-pass-backend -- start
            fi
