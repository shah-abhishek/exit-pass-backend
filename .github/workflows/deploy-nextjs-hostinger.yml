name: Deploy Node.js backend to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app if needed
        run: npm run build --if-present

      - name: Validate deployment secrets
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}
          HOSTINGER_PATH: ${{ secrets.HOSTINGER_PATH }}
        run: |
          missing=0

          if [ -z "$HOSTINGER_HOST" ]; then
            echo "HOSTINGER_HOST is missing"
            missing=1
          fi

          if [ -z "$HOSTINGER_USERNAME" ]; then
            echo "HOSTINGER_USERNAME is missing"
            missing=1
          fi

          if [ -z "$HOSTINGER_PASSWORD" ]; then
            echo "HOSTINGER_PASSWORD is missing"
            missing=1
          fi

          if [ -z "$HOSTINGER_PATH" ]; then
            echo "HOSTINGER_PATH is missing"
            missing=1
          fi

          exit "$missing"

      - name: Deploy files to Hostinger
        uses: appleboy/scp-action@v0.1.6
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: ${{ secrets.HOSTINGER_PORT || 22 }}
          source: "app.js,package.json,package-lock.json"
          target: ${{ secrets.HOSTINGER_PATH }}
          overwrite: true
          rm: true

      - name: Install dependencies on server and restart app
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: ${{ secrets.HOSTINGER_PORT || 22 }}
          script: |
            cd ${{ secrets.HOSTINGER_PATH }}
            npm ci --omit=dev
            npm run build --if-present

            if pm2 list | grep -q "exit-pass-backend"; then
              pm2 restart exit-pass-backend
            else
              pm2 start npm --name exit-pass-backend -- start
            fi
